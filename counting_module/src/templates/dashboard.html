<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APCOMS - Monitoring Dashboard</title>

    <!-- External dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Dashboard styles -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/dashboard.css') }}"
    />
    <!-- Tab restoration runs BEFORE first paint to avoid FOUC.
         Sets a data attribute on <html> that CSS uses to show the
         correct tab from the very first frame, without waiting for
         DOMContentLoaded. -->
    <script>
      (function () {
        try {
          var savedTab = sessionStorage.getItem("apcoms_active_tab");
          if (savedTab) {
            document.documentElement.setAttribute("data-active-tab", savedTab);
          }
        } catch (e) {
          // sessionStorage might be disabled; default tab stays active
        }
      })();
    </script>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div>
        <span class="navbar-brand">APCOMS</span>
        <span class="navbar-brand" style="font-size: 13px; color: #8b8fa8">
          Makerere University E-Shuttle
        </span>
      </div>
      <div class="navbar-right">
        <span class="admin-badge">KMC Admin</span>
        <a href="/logout" class="btn-logout">Logout</a>
      </div>
    </nav>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('monitoring', this)">
        System Monitoring
      </button>
      <button class="tab-btn" onclick="switchTab('analytics', this)">
        Analytics
      </button>
      <button class="tab-btn" onclick="switchTab('settings', this)">
        Settings
      </button>
      <button class="tab-btn" onclick="switchTab('bookings', this)">
        Live Bookings
      </button>
    </div>

    <div class="content">
      <!-- TAB 1: SYSTEM MONITORING -->
      {% include '_monitoring_tab.html' %}

      <!-- TAB 2: ANALYTICS -->
      {% include '_analytics_tab.html' %}

      <!-- TAB 3: SETTINGS -->
      {% include '_settings_tab.html' %}

      <!-- TAB 4: LIVE BOOKINGS (demo only) -->
      {% include '_bookings_tab.html' %}
    </div>

    <!-- Dashboard scripts (order matters — shared utilities first) -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/monitoring.js') }}"></script>
    <script src="{{ url_for('static', filename='js/analytics.js') }}"></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bookings.js') }}"></script>
  </body>
</html>
