<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APCOMS - Admin Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f1117;
        color: #ffffff;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 12px;
        padding: 40px;
        width: 400px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo h1 {
        font-size: 28px;
        color: #4f9ef7;
        font-weight: 700;
        letter-spacing: 2px;
      }

      .logo p {
        color: #8b8fa8;
        font-size: 13px;
        margin-top: 6px;
      }

      .divider {
        border: none;
        border-top: 1px solid #2a2d3a;
        margin: 20px 0;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 13px;
        color: #8b8fa8;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        background: #0f1117;
        border: 1px solid #2a2d3a;
        border-radius: 8px;
        color: #ffffff;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #4f9ef7;
      }

      .btn-login {
        width: 100%;
        padding: 13px;
        background: #4f9ef7;
        border: none;
        border-radius: 8px;
        color: #ffffff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 10px;
        letter-spacing: 1px;
      }

      .btn-login:hover {
        background: #3d8de6;
      }

      .error-message {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.4);
        border-radius: 8px;
        padding: 12px 16px;
        color: #ef4444;
        font-size: 13px;
        margin-bottom: 20px;
        text-align: center;
      }

      .footer {
        text-align: center;
        margin-top: 24px;
        color: #8b8fa8;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <h1>APCOMS</h1>
        <p>AI-Powered Passenger Counting System</p>
        <p>Makerere University E-Shuttle</p>
      </div>

      <hr class="divider" />

      {% if error %}
      <div class="error-message">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter admin username"
            required
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter admin password"
            required
          />
        </div>

        <button type="submit" class="btn-login">LOGIN</button>
      </form>

      <div class="footer">
        <p>KMC Technical Team Access Only</p>
        <p style="margin-top: 4px">BSE26-8 | Makerere University 2026</p>
      </div>
    </div>
  </body>
</html>
