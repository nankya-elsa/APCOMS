name: shuttlego
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  firebase_core: ^3.15.2  # Required for Firebase
  firebase_database: ^11.1.0   # For Realtime Database
  firebase_auth: ^5.3.1
  google_maps_flutter: ^2.9.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  path_provider: ^2.0.0
  path: ^1.8.0
  geolocator: ^9.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  # required for saving ticket PNG on mobile
