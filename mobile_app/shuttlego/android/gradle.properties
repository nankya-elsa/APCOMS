org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Workaround for Kotlin incremental cache issues when sources are on a different drive
# (e.g., project on D: but PUB cache on C:). This can manifest as sporadic missing-class
# compilation errors in dependent plugins.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
